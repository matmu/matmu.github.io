---
permalink: /multi-pitch/
title: "My multi-pitch climbs"
---

{% for y in site.data.multi-pitch %}
  <h2>{{ y.year }}</h2>
    {% for r in y.routes %}
      <div class="notice" style="margin: 1em 0 !important;">
        <h4>{{ r.name }} - {{r.wall}}</h4>
        <p>
          <i class="fas fa-signal"></i><span>&nbsp;{{ r.UIAA }}&nbsp;&nbsp;</span>
          <i class="fas fa-user-friends"></i><span>&nbsp;{{ r.partner }}&nbsp;&nbsp;</span><br/>
          {{ r.country }} / {{r.region}}
        </p>
      </div>
  {% endfor %}
{% endfor %}
