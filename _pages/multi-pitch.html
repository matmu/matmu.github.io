---
permalink: /multi-pitch/
title: "My multi-pitch climbs"
---

{% for y in site.data.multi-pitch %}
  <h2>{{ y.year }}</h2>
    {% for r in y.routes %}
      <div class="notice">
        <h4>{{ r.name }} - {{r.wall}}</h4>
        <p>
          {{ r.UIAA }}<br/>
          {{ r.country }} / {{r.region}}
        </p>
      </div>
  {% endfor %}
{% endfor %}
